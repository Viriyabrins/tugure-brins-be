name: "Build and publish (Staging)"

on:
  push:
    branches: [ develop ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (staging)
        id: build
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile.staging
          push: true
          tags: |
            ghcr.io/viriyabrins/brins-be:staging-latest
            
      - name: Save pushed image digest
        run: |
          echo "${{ steps.build.outputs.digest }}" > image-digest.txt
          echo "Saved image digest to image-digest.txt"
      - name: Upload image digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: staging-image-digest
          path: image-digest.txt

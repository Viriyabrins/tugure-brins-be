name: "Build and publish (Production) - Backend"

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (staging)
        id: build
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile.production
          push: true
          tags: |
            ghcr.io/viriyabrins/brins-be:production-latest
            
      - name: Save pushed image digest
        run: |
          echo "${{ steps.build.outputs.digest }}" > image-digest.txt
          echo "Saved image digest to image-digest.txt"
      - name: Upload image digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-image-digest
          path: image-digest.txt

      - name: Pull pushed image (for export)
        run: |
          echo "Pulling image for packaging...";
          docker pull ghcr.io/viriyabrins/brins-be:production-latest
      - name: Save image tarball
        run: |
          docker save ghcr.io/viriyabrins/brins-be:production-latest | gzip > image-production-latest.tar.gz
      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-image
          path: image-production-latest.tar.gz
  deploy-to-podman:
      needs: build-and-publish
      runs-on: ubuntu-latest
      if: success()
      steps:
        - name: Deploy to remote Podman host as brins
          env:
            IMAGE: ghcr.io/viriyabrins/brins-be:production-latest
            GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
            GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
            SSH_HOST_PROD: ${{ secrets.SSH_HOST_PROD }}
            SSH_USER_PROD: ${{ secrets.SSH_USER_PROD }}
            SSH_PORT_PROD: ${{ secrets.SSH_PORT_PROD }}
            SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
            PRODUCTION_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          run: |
            set -euo pipefail

            if [ -z "${SSH_HOST_PROD:-}" ] || [ -z "${SSH_USER_PROD:-}" ] || [ -z "${SSH_PORT_PROD:-}" ] || [ -z "${SSH_PRIVATE_KEY:-}" ]; then
              echo "Missing SSH_HOST_PROD, SSH_USER_PROD, SSH_PORT_PROD or SSH_PRIVATE_KEY secrets"
              exit 1
            fi

            SSH_PORT=${SSH_PORT_PROD:-22}

            echo "Deploying ${IMAGE} to ${SSH_USER_PROD}@${SSH_HOST_PROD}:${SSH_PORT} using private key auth"

            mkdir -p ~/.ssh
            echo "${SSH_PRIVATE_KEY}" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key

            ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p "${SSH_PORT}" "${SSH_USER_PROD}@${SSH_HOST_PROD}" 'bash -s' -- "${IMAGE}" "${GHCR_USERNAME}" "${GHCR_TOKEN}" "${PRODUCTION_DATABASE_URL}" <<'REMOTE'
            set -euo pipefail
            IMAGE="$1"
            GHCR_USER="$2"
            GHCR_TOKEN="$3"
            PRODUCTION_DATABASE_URL="$4"

            echo "Logging into GHCR as ${GHCR_USER}"
            printf '%s' "${GHCR_TOKEN}" | podman login ghcr.io --username "${GHCR_USER}" --password-stdin

            echo "Pulling image ${IMAGE}"
            podman pull "${IMAGE}"

            # Backup existing container
            TIMESTAMP=$(date +%Y%m%d%H%M%S)
            OLD=$(podman ps -a -q -f name=^brins-be-production$ || true)
            if [ -n "${OLD}" ]; then
              echo "Found existing brins-be-production container, backing up (fixed name)..."
              podman stop brins-be-production || true
              BACKUP_IMAGE=brins-be-production:backup
              podman commit brins-be-production "${BACKUP_IMAGE}" || true
              podman tag "${BACKUP_IMAGE}" brins-be-production:previous || true
              # Remove any existing fixed-name backup container then create stopped backup container for visibility
              BACKUP_CONTAINER="brins-be-production-backup"
              podman rm -f "${BACKUP_CONTAINER}" >/dev/null 2>&1 || true
              podman create --name "${BACKUP_CONTAINER}" "${BACKUP_IMAGE}" >/dev/null 2>&1 || true
              # Show images and containers for visibility
              podman images --filter reference=brins-be-production* || true
              podman ps -a --filter name=^${BACKUP_CONTAINER}$ || true
              podman rm brins-be-production || true
            fi

            echo "Starting new brins-be-production container from ${IMAGE}"
            # Ensure latest image is available
            podman pull "${IMAGE}" || true

            # Prune podman images older than 24 hours to free disk space
            echo "Pruning podman images older than 24 hours..."
            podman image prune -a --filter "until=24h" -f || true

            # Deploy relies on the container entrypoint to run migrations at startup when DATABASE_URL is provided
            echo "Migrations will be executed by the container entrypoint if DATABASE_URL is set."
            podman rm -f brins-be-production >/dev/null 2>&1 || true
            # Start container with DATABASE_URL if provided so the container entrypoint can run migrations
            if [ -n "${PRODUCTION_DATABASE_URL:-}" ]; then
              podman run -d --name brins-be-production --restart=always -e DATABASE_URL="${PRODUCTION_DATABASE_URL}" -p 10011:10011 "${IMAGE}"
            else
              podman run -d --name brins-be-production --restart=always -p 10011:10011 "${IMAGE}"
            fi

            # No host-mounted uploads directory required for this deployment

            sleep 2
            podman ps -a --filter name=^brins-be-production$

            echo "Deploy complete"
            REMOTE
